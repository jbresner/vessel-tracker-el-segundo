<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>El Segundo Terminal — Vessel Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo">EL SEGUNDO <span>//</span> VESSEL TRACKER</div>
    <div class="status-bar">
      <span><span class="status-dot" id="statusDot"></span><span id="statusText">DISCONNECTED</span></span>
      <span id="vesselCount">0 VESSELS</span>
      <span id="clockEl"></span>
      <span style="color:var(--other)">v1.9</span>
    </div>
  </header>

  <!-- DESKTOP LAYOUT -->
  <div class="main desktop-only">
    <div class="sidebar">
      <div class="api-section">
        <div class="controls-row">
          <button id="connectBtn" onclick="toggleConnection()">CONNECT</button>
          <button class="secondary" onclick="reconnect()">↺ RESET</button>
        </div>
        <div class="radius-row">
          <label>RADIUS</label>
          <input type="range" id="radiusSlider" min="1" max="20" value="5" oninput="updateRadius(this.value)"/>
          <span class="radius-val" id="radiusVal">5 nm</span>
        </div>
      </div>
      <div class="list-header">
        <span>VESSELS IN RANGE</span>
        <span id="listCount">0</span>
      </div>
      <div class="vessel-list" id="vesselList">
        <div class="no-vessels">Connecting…</div>
      </div>
    </div>

    <div id="map"></div>

    <div class="detail-panel">
      <div class="detail-header">VESSEL DETAIL</div>
      <div class="detail-body" id="detailBody">
        <div class="detail-empty">Select a vessel<br>to view details</div>
      </div>
      <div class="log-section">
        <div class="section-label" style="padding:4px 0 6px">ACTIVITY LOG</div>
        <div id="logEntries"></div>
      </div>
    </div>
  </div>

  <!-- MOBILE LAYOUT -->
  <div class="mobile-layout mobile-only">

    <!-- Map fills screen -->
    <div id="mobileMap"></div>

    <!-- Floating top bar -->
    <div class="m-topbar">
      <div class="m-status">
        <span class="status-dot" id="mStatusDot"></span>
        <span id="mStatusText">DISCONNECTED</span>
      </div>
      <div class="m-controls">
        <button class="m-btn" id="mConnectBtn" onclick="toggleConnection()">CONNECT</button>
        <button class="m-btn secondary" onclick="reconnect()">↺</button>
      </div>
      <div class="m-radius">
        <input type="range" id="mRadiusSlider" min="1" max="20" value="5" oninput="updateRadius(this.value)"/>
        <span id="mRadiusVal">5nm</span>
      </div>
    </div>

    <!-- Vessel count pill -->
    <div class="m-count-pill" id="mCountPill" onclick="openSheet('list')">
      <span id="mVesselCount">0 VESSELS</span>
      <span class="m-pill-arrow">↑</span>
    </div>

    <!-- Slide-up sheet -->
    <div class="m-sheet" id="mSheet">
      <div class="m-sheet-bar" onclick="toggleSheet()"></div>

      <!-- List view -->
      <div id="mListView">
        <div class="m-sheet-title">
          <span>VESSELS IN RANGE</span>
          <span id="mListCount">0</span>
        </div>
        <div class="vessel-list" id="mVesselList">
          <div class="no-vessels">Connecting…</div>
        </div>
        <div class="m-log">
          <div class="section-label" style="padding:4px 0 6px">ACTIVITY LOG</div>
          <div id="mLogEntries"></div>
        </div>
      </div>

      <!-- Detail view -->
      <div id="mDetailView" style="display:none">
        <div class="m-sheet-title">
          <button class="m-back" onclick="showMobileList()">← BACK</button>
          <span>VESSEL DETAIL</span>
        </div>
        <div class="detail-body" id="mDetailBody"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
